services:
  db:
    image: postgres:16
    container_name: portal_gov_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: inventario_gov
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventario_gov"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal_gov_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9090:9090"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: portal_gov_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg_data: