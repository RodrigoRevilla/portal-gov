<header class="navbar">
  <div class="navbar-inner">
    <div class="navbar-brand" routerLink="/home">
      <div class="navbar-escudo">Ω</div>
      <div class="navbar-title">
        Portal de Sistemas
        <span>Secretaría de Administración · Oaxaca</span>
      </div>
    </div>

    <nav class="navbar-nav" *ngIf="usuario">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
      <a routerLink="/inventario" routerLinkActive="active" *ngIf="tieneSistema('inventario')">Inv·Gov</a>
      <a routerLink="/control-oficiales" routerLinkActive="active" *ngIf="tieneSistema('control-oficiales')">Control de Oficiales</a>
    </nav>

    <div class="navbar-user" *ngIf="usuario">
      <div class="user-info">
        <strong>{{ usuario.nombre }}</strong>
        <span>{{ rolLabel }}</span>
      </div>
      <div class="user-avatar">{{ inicial }}</div>
      <button class="btn-cambiar-pass" (click)="abrirCambiarPass()">Contraseña</button>
      <button class="btn-logout" (click)="logout()">Salir</button>
    </div>
  </div>
</header>

@if (mostrarCambiarPass) {
  <div class="modal-overlay" (click)="mostrarCambiarPass = false">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-head">
        <h2>Cambiar contraseña</h2>
        <button class="modal-close" (click)="mostrarCambiarPass = false">✕</button>
      </div>
      <div class="modal-body">

        <div class="form-field" style="margin-bottom:14px">
          <label>Contraseña actual</label>
          <div class="input-eye-wrap">
            <input [type]="verActual ? 'text' : 'password'"
                   [(ngModel)]="passActual" placeholder="••••••••"/>
            <button type="button" class="eye-btn" (click)="verActual = !verActual">
              @if (verActual) {
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5
                       12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0
                       0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0
                       01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894
                       7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242
                       4.242L9.88 9.88"/>
                </svg>
              } @else {
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12
                       4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0
                       .639C20.577 16.49 16.64 19.5 12 19.5c-4.638
                       0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-field" style="margin-bottom:14px">
          <label>Nueva contraseña</label>
          <div class="input-eye-wrap">
            <input [type]="verNueva ? 'text' : 'password'"
                   [(ngModel)]="passNueva" placeholder="••••••••"/>
            <button type="button" class="eye-btn" (click)="verNueva = !verNueva">
              @if (verNueva) {
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5
                       12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0
                       0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0
                       01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894
                       7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242
                       4.242L9.88 9.88"/>
                </svg>
              } @else {
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12
                       4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0
                       .639C20.577 16.49 16.64 19.5 12 19.5c-4.638
                       0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-field">
          <label>Confirmar nueva contraseña</label>
          <div class="input-eye-wrap">
            <input [type]="verConfirm ? 'text' : 'password'"
                   [(ngModel)]="passConfirm" placeholder="••••••••"/>
            <button type="button" class="eye-btn" (click)="verConfirm = !verConfirm">
              @if (verConfirm) {
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5
                       12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0
                       0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0
                       01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894
                       7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242
                       4.242L9.88 9.88"/>
                </svg>
              } @else {
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12
                       4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0
                       .639C20.577 16.49 16.64 19.5 12 19.5c-4.638
                       0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        @if (passError) {
          <div class="alert-error" style="margin-top:12px">{{ passError }}</div>
        }
        @if (passExito) {
          <div class="alert-success" style="margin-top:12px">Contraseña actualizada correctamente</div>
        }

      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" (click)="mostrarCambiarPass = false">Cancelar</button>
        <button class="btn btn-primary" [disabled]="guardandoPass" (click)="cambiarPassword()">
          {{ guardandoPass ? 'Guardando…' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>
}
