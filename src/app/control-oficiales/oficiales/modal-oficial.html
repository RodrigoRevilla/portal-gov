<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal">

    <div class="modal-head">
      <h2>{{ editando ? 'Editar Oficial' : 'Nuevo Oficial' }}</h2>
      <button class="modal-close" (click)="cerrar.emit()">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-grid">

        <div class="form-field full">
          <label>Nombre(s)</label>
          <input type="text" [(ngModel)]="form['nombres']" placeholder="Ej. Juan Carlos"/>
        </div>

        <div class="form-field">
          <label>Apellido paterno</label>
          <input type="text" [(ngModel)]="form['ap1']" placeholder="Ej. García"/>
        </div>

        <div class="form-field">
          <label>Apellido materno</label>
          <input type="text" [(ngModel)]="form['ap2']" placeholder="Ej. López"/>
        </div>

        <div class="form-field">
          <label>Username</label>
          <input type="text" [(ngModel)]="form['username']" placeholder="AAAA000000HOCRRR01"
                 maxlength="18" style="text-transform:uppercase"/>
        </div>

        <div class="form-field">
          <label>Teléfono</label>
          <input type="tel" [(ngModel)]="form['tel']" placeholder="951 123 4567" maxlength="15"/>
        </div>

        <div class="form-field">
          <label>Perfil</label>
          <select [(ngModel)]="form['perfil']">
            <option value="OFICIALES">OFICIALES</option>
            <option value="USUARIO LOCAL">USUARIO LOCAL</option>
            <option value="ADMINISTRADOR">ADMINISTRADOR</option>
          </select>
        </div>

        <div class="form-field">
          <label>Municipio</label>
          <input type="text" [(ngModel)]="form['municipio']"
                 placeholder="Ej. OAXACA DE JUAREZ" style="text-transform:uppercase"/>
        </div>

        <div class="form-field">
          <label>Sistema</label>
          <select [(ngModel)]="form['sistema']">
            <option value="">-- Sin definir --</option>
            <option value="SID">SID</option>
            <option value="SIRCO">SIRCO</option>
          </select>
        </div>

        <div class="form-field full">
          <label>Oficialía</label>
          <select [(ngModel)]="form['ofic']" (ngModelChange)="onOficialiaChange($event)">
            @for (o of oficialias; track o.id) {
              <option [value]="o.nombre">{{ o.nombre }}</option>
            }
          </select>
        </div>

        <div class="form-field full">
          <label>Región</label>
          <input type="text" [value]="form['region'] || ''" readonly
                 style="background:#f5f5f5;color:var(--text-mid)"/>
        </div>

        <div class="form-field full">
          <label>Correo electrónico</label>
          <input type="email" [(ngModel)]="form['email']"
                 placeholder="oficial@registrocivil.oax.gob.mx"/>
        </div>

        <div class="form-field full">
          <label>Servicios y accesos</label>
          <div class="checks">
            <label class="check-item">
              <input type="checkbox" [(ngModel)]="form['sid']"/>
              <span><strong>SID</strong> — Sistema de Identidad Digital</span>
            </label>
            <label class="check-item">
              <input type="checkbox" [(ngModel)]="form['internet']"/>
              <span><strong>Internet</strong> — Conexión convencional</span>
            </label>
            <label class="check-item">
              <input type="checkbox" [(ngModel)]="form['starlink']"/>
              <span><strong>Starlink</strong> — Conexión satelital</span>
            </label>
          </div>
        </div>

        <div class="form-field full">
          <label>Estado</label>
          <div class="checks">
            <label class="check-item">
              <input type="checkbox" [(ngModel)]="form['activo']"/>
              <span>Activo en el sistema</span>
            </label>
          </div>
        </div>

        <div class="form-field full">
          <label>Observaciones</label>
          <input type="text" [(ngModel)]="form['obs']" placeholder="Notas adicionales (opcional)"/>
        </div>

      </div>
    </div>

    <div class="modal-foot">
      <button class="btn btn-secondary" (click)="cerrar.emit()">Cancelar</button>
      <button class="btn btn-primary" [disabled]="guardando" (click)="guardar()">
        {{ guardando ? 'Guardando…' : 'Guardar' }}
      </button>
    </div>

  </div>
</div>
