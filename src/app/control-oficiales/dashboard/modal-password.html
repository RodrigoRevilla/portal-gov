<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal" style="width:420px">

    <div class="modal-head">
      <h2>Cambiar contraseña</h2>
      <button class="modal-close" (click)="cerrar.emit()">✕</button>
    </div>

    <div class="modal-body">

      @if (error) {
        <div class="alert-error">{{ error }}</div>
      }
      @if (exito) {
        <div class="alert-success">{{ exito }}</div>
      }

      <div class="form-grid" style="grid-template-columns:1fr">

        <div class="form-field">
          <label>Contraseña actual</label>
          <div class="input-eye-wrap">
            <input [type]="showActual ? 'text' : 'password'"
                   [(ngModel)]="actual" placeholder="••••••••"/>
            <button type="button" class="eye-btn" (click)="showActual = !showActual">
              @if (showActual) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-field">
          <label>Nueva contraseña</label>
          <div class="input-eye-wrap">
            <input [type]="showNueva ? 'text' : 'password'"
                   [(ngModel)]="nueva" placeholder="Mínimo 6 caracteres"/>
            <button type="button" class="eye-btn" (click)="showNueva = !showNueva">
              @if (showNueva) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="form-field">
          <label>Confirmar nueva contraseña</label>
          <div class="input-eye-wrap">
            <input [type]="showConfirmar ? 'text' : 'password'"
                   [(ngModel)]="confirmar" placeholder="Repite la nueva contraseña"/>
            <button type="button" class="eye-btn" (click)="showConfirmar = !showConfirmar">
              @if (showConfirmar) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

      </div>
    </div>

    <div class="modal-foot">
      <button class="btn btn-secondary" (click)="cerrar.emit()">Cancelar</button>
      <button class="btn btn-primary" [disabled]="guardando" (click)="guardar()">
        {{ guardando ? 'Guardando…' : 'Actualizar contraseña' }}
      </button>
    </div>

  </div>
</div>
