<div class="login-screen">
  <div class="login-card">

    <div class="login-escudo">
      <div class="shield">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7L12 2z"/></svg>
      </div>
      <div class="login-title">Sistema de Oficiales<br>Registro Civil</div>
      <div class="login-sub">Estado de Oaxaca — Acceso Restringido</div>
    </div>

    @if (error) {
      <div class="login-error">{{ error }}</div>
    }

    <div class="field-group">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="usuario" placeholder="admin"
             autocomplete="username" (keydown.enter)="doLogin()"/>
    </div>

    <div class="field-group">
      <label>Contraseña</label>
      <div class="input-eye-wrap">
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
               placeholder="••••••••" autocomplete="current-password"
               (keydown.enter)="doLogin()"/>
        <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
          @if (showPassword) {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </div>

    <button class="btn-login" [disabled]="loading" (click)="doLogin()">
      {{ loading ? 'Verificando…' : 'Iniciar sesión' }}
    </button>

    <div class="login-footer">Registro Civil Oaxaca © 2025</div>
  </div>
</div>
